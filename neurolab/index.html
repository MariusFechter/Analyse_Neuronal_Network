<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROLAB | Neuronal Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #000000;
            color: #F5F5F5;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header-container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        /* Überschrift jetzt deutlich kleiner und eleganter */
        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #ff7517;
        }

        p.subline {
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #d9d9d9;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Einzelne Analyse-Kachel */
        .product-card {
            background-color: #080808;
            border: 1px solid #161616;
            border-radius: 20px;
            width: 100%;
            max-width: 340px; /* Perfekte, kompakte Größe */
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .product-card:hover { transform: translateY(-5px); border-color: #333; }

        .card-image-wrapper { width: 100%; padding-top: 135%; position: relative; }
        .card-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .card-content { padding: 20px; }

        .tag {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #ff7517;
            margin-bottom: 8px;
            display: block;
        }

        .product-title { font-size: 1.1rem; font-weight: 700; color: #ffffff; margin-bottom: 6px; }
        .product-subtitle { font-size: 0.8rem; color: #999; margin-bottom: 20px; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .price-tag { font-size: 1rem; font-weight: 700; }

        .checkout-btn {
            background-color: #38b6ff;
            color: #ffffff; /* Weißer Text auf Blau */
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            transition: background-color 0.2s;
        }

        .checkout-btn:hover { background-color: #219ee6; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>NEUROLAB | NEURONAL NETWORK</h1>
        <p class="subline">Neuropsychologie & Muster</p>
    </div>

    <div class="product-card">
        <div class="card-image-wrapper">
            <img src="Preview_slide3.jpg" alt="Analyse" class="card-image">
        </div>
        <div class="card-content">
            <span class="tag">Analyse</span>
            <h2 class="product-title">Rausch oder Realität?</h2>
            <p class="product-subtitle">Warum Substanzen dein Verhalten verändern.</p>
            
            <div class="card-footer">
                <div class="price-tag">15,00 €</div>
                <a href="https://zugang.neuronalnetwork.de/checkout/buy/3bf34f1a-b531-4855-8c97-6c0456f51a7d" class="checkout-btn">Analyse freischalten</a>
            </div>
        </div>
    </div>

</body>
</html>
