<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROLAB | Neuronal Network</title>
    <!-- Standard Clean Sans-Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #F5F5F5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden;
            padding: 80px 24px 24px 24px; /* Abstand oben auf Desktop */
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }

        /* Clean, standard uppercase headline on a single line */
        h1 {
            font-size: 3.5vw; 
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #ff7517;
            line-height: 1.2;
            white-space: nowrap; /* Verhindert jeglichen Zeilenumbruch */
        }

        /* Standard clean subline in grey */
        p.subline {
            font-size: 1.5vw;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #d9d9d9;
            text-transform: uppercase;
            margin-top: 12px;
            white-space: nowrap; /* Verhindert auch hier den Umbruch */
        }

        /* Perfekte Anpassung für mobile Bildschirme (Handys) */
        @media (max-width: 768px) {
            body {
                padding-top: 60px; /* Leicht reduzierter Abstand nach oben auf dem Handy */
            }
            h1 {
                font-size: 4.8vw; /* Skaliert die Schrift exakt passend zur Displaybreite */
                letter-spacing: 0.02em; /* Minimal enger für perfekten Halt auf einer Zeile */
                white-space: nowrap; /* Erzwingt die einzeilige Darstellung */
            }
            p.subline {
                font-size: 2.5vw; /* Skaliert auch die Unterzeile sauber einzeilig mit */
                margin-top: 8px;
                white-space: nowrap;
            }
        }

        /* Extrem kleine Displays (z.B. ältere iPhones) */
        @media (max-width: 380px) {
            h1 {
                font-size: 4.5vw;
            }
            p.subline {
                font-size: 2.2vw;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NEUROLAB | NEURONAL NETWORK</h1>
        <p class="subline">Neuropsychologie & Muster</p>
    </div>

</body>
</html>
