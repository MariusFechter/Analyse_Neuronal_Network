<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressum - Neuronal Network</title>
    <style>
        /* Verhindert Ränder und nutzt die volle Bildschirmhöhe */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
        }

        /* System-Fonts für maximale Ladegeschwindigkeit (Page Speed) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
        }

        /* Zentrierter Container für optimalen Lesefluss auf allen Bildschirmen */
        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Styling der Hauptüberschrift in deiner Brand-Farbe */
        h1 {
            color: #38b6ff;
            font-size: 2.2rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: -0.02em;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        /* Zwischenüberschriften ebenfalls in deiner Brand-Farbe */
        h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #38b6ff;
            margin-top: 30px;
            margin-bottom: 10px;
            border-bottom: 1px solid #222222;
            padding-bottom: 5px;
        }

        /* Textblöcke und Paragraphen */
        p {
            font-size: 0.95rem;
            color: #cccccc;
            margin: 0 0 15px 0;
        }

        /* Links im Text (z.B. E-Mail) in deiner Brand-Farbe */
        a {
            color: #38b6ff;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        a:hover {
            text-decoration: underline;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Hauptüberschrift -->
        <h1>Impressum - Neuronal Network</h1>

        <!-- Anbieterkennzeichnung -->
        <h2>Angaben gemäß § 5 DDG</h2>
        <p>
            Marius Fechter<br>
            Kapellenstraße 33<br>
            78727 Oberndorf am Neckar
        </p>

        <!-- Vertretung -->
        <h2>Vertreten durch</h2>
        <p>
            Marius Fechter
        </p>

        <!-- Kontakt -->
        <h2>Kontakt</h2>
        <p>
            Telefon: +49-15111252212<br>
            E-Mail: <a href="mailto:theneuronalnetwork@googlemail.com">theneuronalnetwork@googlemail.com</a>
        </p>
    </div>

</body>
</html>
